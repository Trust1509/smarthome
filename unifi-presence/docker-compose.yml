services:
  unifi_presence:
    container_name: unifi_presence
    image: python:3.12-slim
    restart: unless-stopped
    volumes:
      - /mnt/VMs/Data/unifi_presence:/app
    working_dir: /app
    command: >
      sh -c "pip install httpx paho-mqtt --quiet &&
             python -u presence.py"
    environment:
      - TZ=Europe/Vienna
    networks:
      - presence_net

networks:
  presence_net:
    external: true
    name: Z2M create  # replace with your Docker network name if different
